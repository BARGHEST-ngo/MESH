version: '3'

vars:
  API_KEY_EXPIRATION: 3h

dotenv:
  - .env

tasks:
  configureDotEnv:
    desc: Configure .env file
    requires:
      vars:
        - name: EPHEMERAL_DEPLOYMENT
          enum: ["true", "false"]
    vars:
      DEFAULT_CORS_ORIGIN: https://{{.CONTROL_PLANE_DOMAIN | default "localhost"}}
    cmds:
      - '[ -f .env ] || (touch .env && chmod 600 .env)'
      - grep -s CONTROL_PLANE_DOMAIN .env || echo "CONTROL_PLANE_DOMAIN={{.CONTROL_PLANE_DOMAIN | default "localhost"}}" >> .env
      - grep -s EPHEMERAL_DEPLOYMENT .env || echo "EPHEMERAL_DEPLOYMENT={{.EPHEMERAL_DEPLOYMENT}}" >> .env
      - grep -s CORS_ORIGIN .env || echo "CORS_ORIGIN={{.CORS_ORIGIN | default .DEFAULT_CORS_ORIGIN }}" >> .env
      - cmd: grep -s LOGIN_URL .env || echo "LOGIN_URL={{.LOGIN_URL | default .DEFAULT_LOGIN_URL }}" >> .env
        if: '{{eq .EPHEMERAL_DEPLOYMENT "false"}}'
    silent: true

  configureControlPlane:
    desc: Configure MESH control plane
    requires:
      vars:
        - CONTROL_PLANE_DOMAIN
    cmd: >
      sed -e "s/CONTROL_PLANE_DOMAIN/{{.CONTROL_PLANE_DOMAIN}}/g"
      control-plane/headscale/config/config.example.yaml > control-plane/headscale/config/config.yaml
    silent: true
    sources:
      - control-plane/headscale/config/config.example.yaml
    generates:
      - control-plane/headscale/config/config.yaml
    deps:
      - configureDotEnv

  apikey:
    desc: Generate a Headscale API key
    cmd: >
      docker compose exec headscale headscale apikeys create --expiration {{.API_KEY_EXPIRATION}} ||
      echo "Control plane is not running. Start it with 'task up' first."
    silent: true

  build:
    desc: Build MESH Docker containers
    cmd: docker compose build
    deps:
      - configureControlPlane

  up:
    desc: Start MESH Docker containers
    cmd: docker compose up -d --build
    deps:
      - configureControlPlane

  down:
    desc: Stop MESH Docker containers
    cmd: docker compose down

  analyst:
    desc: Start MESH analyst client
    requires:
      vars:
        - AUTH_KEY
    cmd: >
      grep -s AUTH_KEY .env && sed -i "s/^AUTH_KEY=.*$/AUTH_KEY={{.AUTH_KEY}}/" .env || echo "AUTH_KEY={{.AUTH_KEY}}" >> .env &&
      export AUTH_KEY={{.AUTH_KEY}} &&
      docker compose up -d &&
      docker compose exec analyst meshcli {{.CLI_ARGS}}
    silent: true
    deps:
      - configureControlPlane

#################################
# Development tasks
#################################

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  generate:
    desc: Generate code
    cmds:
      - go generate ./...

  buildAnalyst:
    desc: Build MESH analyst client
    cmds:
      - ./analyst/src/build.sh

  buildAndroid:
    desc: Build MESH Android client
    cmds:
      - make -C android-client apk

  buildAndroidRelease:
    desc: Build MESH Android client for release
    cmds:
      - make -C android-client release-apk

  buildAndroidSigned:
    desc: Build signed MESH Android client for release
    cmds:
      - make -C android-client release-apk-signed

  clean:
    desc: Clean up build artifacts
    cmds:
      - rm -f analyst/mesh
      - make -C android-client clean
