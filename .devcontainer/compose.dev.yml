services:
  # Development container with all build tools and dependencies
  analyst:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: mesh-dev
    volumes:
      - .:/workspace:cached
      - /var/run/docker.sock:/var/run/docker-host.sock # Docker-outside-of-Docker
    working_dir: /workspace
    entrypoint: /usr/local/share/docker-init.sh
    command: sleep infinity
    network_mode: service:nginx
    environment:
      - ANDROID_SDK_ROOT=/usr/local/android-sdk
      - ANDROID_HOME=/usr/local/android-sdk

  # Override nginx configuration for development
  nginx:
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      - NGINX_MODE=dev
