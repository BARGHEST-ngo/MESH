services:
  headscale:
    image: docker.io/headscale/headscale:0.28.0
    restart: unless-stopped
    container_name: headscale
    volumes:
      - ./control-plane/headscale/config:/etc/headscale
      - ./control-plane/headscale/lib:/var/lib/headscale
    tmpfs:
      - /var/run/headscale
    command: serve

  # https://github.com/juanfont/headscale/issues/623
  # nginx reverse proxies to headscale and mesh-ui, adding security-related headers (CORS, CSP, etc.)
  nginx:
    build: ./control-plane/mesh-ui
    restart: unless-stopped
    container_name: mesh-ui
    volumes:
      - ./control-plane/nginx.conf:/etc/nginx/nginx.conf.template
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NGINX_MODE=prod
    depends_on:
      - headscale
    ports:
      - "127.0.0.1:80:80"
    entrypoint: /bin/sh -c "envsubst '$$CORS_ORIGIN $$NGINX_MODE' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"