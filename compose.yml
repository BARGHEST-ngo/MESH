services:
  headscale:
    image: docker.io/headscale/headscale:0.28.0
    restart: unless-stopped
    container_name: headscale
    volumes:
      - ./control-plane/headscale/config:/etc/headscale
      - headscale-data:/var/lib/headscale
    tmpfs:
      - /var/run/headscale
    command: serve

  nginx:
    build: ./control-plane/mesh-ui
    restart: unless-stopped
    container_name: mesh-ui
    volumes:
      - ./control-plane/nginx.conf:/etc/nginx/nginx.conf.template
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NGINX_MODE=prod
    depends_on:
      - headscale
    ports:
      - "127.0.0.1:80:80"
    entrypoint: /bin/sh -c "envsubst '$$CORS_ORIGIN $$NGINX_MODE' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  analyst:
    build:
      context: .
      dockerfile: analyst/Dockerfile
    container_name: mesh-analyst
    volumes:
      - analyst-data:/var/run/tailscale
    depends_on:
      - nginx
      - headscale
    env_file: [.env, .authkey]
    environment:
      - LOGIN_URL=${LOGIN_URL:-http://mesh-ui}
      - AUTH_KEY=${AUTH_KEY}

volumes:
  headscale-data:
  analyst-data: