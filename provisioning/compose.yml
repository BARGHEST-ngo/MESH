services:
  provisioner:
    image: ghcr.io/barghest-ngo/mesh-provisioner:latest
    build:
      context: ../
      dockerfile: provisioning/Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - provisioner.env
    environment:
      - HOST_DATA_PATH=/var/lib/mesh-provisioner
    volumes:
      - /var/lib/mesh-provisioner:/var/lib/mesh-provisioner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mesh-proxy

  traefik:
    image: traefik:v3.7.5
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/ssl/mesh:/certs:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./tls.yml:/tls.yml:ro
    networks:
      - mesh-proxy

networks:
  mesh-proxy:
    name: mesh-proxy