# OSV-Scanner allowlist for known-and-acknowledged vulnerabilities.
#
# Each entry below has been manually triaged. The vulnerable code lives in
# upstream tailscale subsystems that MESH does NOT compile into libtailscale.aar
# or any shipping binary (k8s-operator, tsnet, tsconsensus, natlab/vnet test
# infrastructure, release/dist RPM packaging, gorilla web UI). They surface in
# the tailscale-build-context scan because the tailscale source tree contains
# code we don't link.
#
# Triage notes:
#   - "called=false"  : osv-scanner call analysis confirmed the vulnerable
#                       function is not reached from MESH's code paths
#   - "no analysis"   : govulncheck has no function-level signature for the
#                       vuln; reachability was determined manually by tracing
#                       the call path through tailscale's source
#
# Re-review policy: each entry has an ignoreUntil date. When an entry expires,
# osv-scanner will re-fail CI on that vuln until either (a) the suppression is
# refreshed with current triage notes, or (b) the underlying issue is fixed by
# bumping the dependency / patching tailscale's go.mod.

# ----- bbolt -----

[[IgnoredVulns]]
id = "GO-2026-4923"
ignoreUntil = 2026-10-07
reason = """
go.etcd.io/bbolt v1.4.2 — no upstream fix available.

Reported as called=true by osv-scanner, but the only concrete call paths
go through tailscale.com/tsnet and tailscale.com/tsconsensus (raft consensus
store), neither of which MESH compiles. This is a govulncheck interface-
analysis false positive following sync.Once.Do across the whole-program
call graph.
"""

