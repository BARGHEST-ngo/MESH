pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # /tmp paths so nginx works as non-root.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # Maps the Upgrade header to the appropriate Connection header value
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ============================================================================
    # ENVIRONMENT-BASED CONFIGURATION
    # ============================================================================
    # Set NGINX_MODE environment variable to control behavior:
    #   - "dev"  : Proxy all requests to Vite dev server (http://localhost:3000)
    #   - "prod" : Serve static files from /usr/share/nginx/html with SPA routing
    #
    # Default is "prod" if NGINX_MODE is not set
    # ============================================================================

    map $nginx_mode $should_proxy {
        default 0;      # prod mode default (serve static)
        "dev"   1;      # dev mode (proxy)
        "prod"  0;      # explicit prod mode (serve static)
    }

    server {
        # 8080 (not 80) so the master can run as the nginx user. Compose maps host port 80 to container 8080.
        listen 8080;
        http2 on;
        server_name localhost;

        # Set nginx_mode variable from environment variable (substituted by envsubst)
        set $nginx_mode "${NGINX_MODE}";

        root /usr/share/nginx/html;
        index index.html;
        
        # MIME types
        include /etc/nginx/mime.types;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '${CORS_ORIGIN}' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 1728000 always;

        # Security headers
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' unpkg.com; style-src 'self' 'unsafe-inline' unpkg.com; img-src 'self' data:; font-src 'self' data:;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Proxy headers for WebSocket and HTTP
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeout settings (24 hours for long-lived connections)
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;

        # Proxy all API endpoints to the headscale service
        location ~ ^/(api|register|key|machine|derp|verify|health|ts2021|swagger) {
            proxy_pass http://headscale:8080;
        }

        location / {
            if ($should_proxy = 1) {
                proxy_pass http://localhost:3000;
            }
            try_files $uri $uri/ /index.html;
        }
    }
}
