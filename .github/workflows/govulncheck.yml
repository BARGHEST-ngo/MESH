name: Vulnerability scan

on:
  pull_request:
  push:
    branches:
      - main

# govulncheck only reads source code; no write access is needed.
permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Use the exact Go toolchain declared in go.mod.
      # Disable the built-in module cache used by setup-go because
      # govulncheck-action manages its own cache.
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Generate code
        run: go generate ./...

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1.0.4
        with:
          work-dir: tailscale/
